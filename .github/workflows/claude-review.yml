name: Claude Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore: [develop]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && github.actor != 'claude[bot]' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_PAT }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
          prompt: |
            Review this PR diff for bugs, security issues, and code quality problems.

            Rules:
            - If you find fixable issues (bugs, missing error handling, security gaps),
              fix them directly — edit the files, commit with message format
              "fix(review): <description>", and push.
            - If the PR is clean (no issues, or all issues fixed), approve it.
            - If there are issues you CANNOT fix (architectural problems, unclear intent,
              security decisions needing human judgment), request changes with clear,
              actionable comments explaining what needs to change and why.
            - Focus on: correctness, security, error handling, consistency with existing
              patterns, and data integrity. Do NOT nitpick style — the linter handles that.
            - Do NOT flag issues in CI/workflow YAML, docs, or config-only changes
              unless they have security implications.
            - Keep review comments concise and actionable.
