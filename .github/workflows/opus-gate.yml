name: Opus Gate
# G3 Opus — fresh-context decider gate.
#
# Emits the `opus-gate` required status check. Opus is given a full,
# fresh-context review of the PR diff and must approve or request changes.
# Its pass/fail IS the gate signal — a merge cannot proceed until this is green.
#
# Risk-tiered skip: docs-only / markdown-only diffs that touch no high-risk
# paths get an automatic pass to avoid burning Opus budget on trivial changes.
# ANY touch of a high-risk path forces the full Opus pass.
#
# High-risk paths for savvy_landing (static marketing site):
#   .github/**        — CI/CD workflows (brick-risk)
#   *.js              — build/deploy scripts
#   deploy / build config (*.json, *.yml, *.sh)
# HTML/CSS/content-only diffs fall to the docs tier and auto-pass Opus.
#
# No squawk step here — savvy_landing has no DB migrations.
#
# Loop guard: `github.actor != 'claude[bot]'` prevents Opus from reviewing
# its own fix commits (same pattern as G2 Sonnet).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip develop→main promotion PRs; G4 (prod gate) handles that boundary
    branches-ignore: [develop]

jobs:
  opus-gate:
    name: opus-gate
    # Skip Claude's own fix commits and Dependabot
    if: |
      github.actor != 'claude[bot]' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: opus-gate-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_PAT }}

      # Risk-tier check: if ALL changed files are docs/markdown only, skip Opus.
      # Any high-risk path triggers the full pass.
      - name: Check risk tier
        id: risk_tier
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files -q '.files[].path') \
            || { echo "::error::gh pr view failed — cannot determine risk tier; blocking."; exit 1; }

          HIGH_RISK=false
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then continue; fi
            # High-risk paths: source code, CI/CD, any non-doc file
            if [[ "$file" =~ ^src/ ]] || \
               [[ "$file" =~ ^\.github/ ]] || \
               [[ "$file" =~ \.(ts|js|mts|mjs|cjs)$ ]] || \
               [[ "$file" =~ \.(json|yaml|yml|toml|sh)$ ]]; then
              HIGH_RISK=true
              echo "High-risk path detected: $file"
              break
            fi
          done <<< "$FILES"

          if [ "$HIGH_RISK" = true ]; then
            echo "tier=high" >> "$GITHUB_OUTPUT"
            echo "Opus full review required."
          else
            echo "tier=docs" >> "$GITHUB_OUTPUT"
            echo "Docs-only diff — Opus pass will be skipped."
          fi

      # Auto-pass for docs-only diffs: emit a synthetic success comment and exit.
      - name: Auto-pass docs-only diff
        if: steps.risk_tier.outputs.tier == 'docs'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUMBER" \
            --body "**opus-gate:** docs-only diff — full Opus review skipped. ✅" \
            || true
          echo "Docs-only auto-pass complete."

      # Full Opus review — only runs on high-risk diffs.
      - uses: anthropics/claude-code-action@v1
        id: opus_review
        if: steps.risk_tier.outputs.tier == 'high'
        continue-on-error: true
        with:
          github_token: ${{ secrets.CLAUDE_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-8 --max-turns 40"
          prompt: |
            You are the Opus decider gate (G3) in a multi-model PR review ladder.
            Sonnet (G2) has already reviewed and auto-fixed what it could.
            Your role is a FRESH-CONTEXT, independent senior review — do NOT assume
            Sonnet caught everything.

            Review this PR diff with the following priorities:

            SECURITY (BLOCK if found):
            - Authentication or authorization bypasses
            - Injection vulnerabilities (command, path, prompt)
            - Secrets or credentials in code
            - Unsafe external input handling
            - Exposed sensitive data in logs or errors

            CORRECTNESS (BLOCK if found):
            - Logic errors that would cause incorrect behavior
            - Missing error handling on critical paths
            - Data integrity violations
            - Race conditions or async errors

            ARCHITECTURE (REQUEST CHANGES if found):
            - Patterns inconsistent with the existing codebase
            - Missing abstractions that will cause future drift
            - Unnecessary complexity

            DECISIONS:
            - APPROVE if the PR is correct and safe. Approval IS the merge signal.
            - REQUEST CHANGES with specific, actionable comments if issues remain.
              Include what must change and why — be concise, not verbose.
            - Do NOT nitpick style, formatting, or minor naming. Focus on what matters.
            - Do NOT re-flag issues Sonnet already fixed (check the diff carefully).

            This is a static marketing site (HTML/CSS/JS). High-risk areas: deploy
            and build configuration, CI/CD workflows, and any JavaScript. Content,
            HTML, and CSS changes are lower-risk. Watch for leaked secrets/keys in
            client-side code or config. No DB migrations exist — do NOT look for them.

            After your review, output the verdict as the VERY LAST line, exactly one of:
              OPUS_GATE_VERDICT: PASS   (only if you would APPROVE — correct and safe)
              OPUS_GATE_VERDICT: FAIL   (if you would REQUEST CHANGES — any security/correctness/data-integrity blocker)
            Output nothing after that line.

      # Fail-closed for the Opus pass — execution-file-first, whole-array JSON parse.
      # Logic lives in .github/scripts/gate_check_ran.py (avoids inline Python
      # which breaks YAML parsing when the heredoc contains special characters).
      # Source of truth is the execution file (result event / is_error), not the
      # `conclusion` output. Same decision tree as G2 (claude-review.yml).
      - name: Enforce Opus review actually ran
        if: steps.risk_tier.outputs.tier == 'high' && always()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
        run: |
          set -uo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          # Workflow-edit detection: a PR touching .github/workflows/** must never
          # auto-pass — the reviewer cannot push fixes there (the token lacks the
          # `workflows` scope), so route it to a human regardless of review outcome.
          # Fail CLOSED if the file list can't be fetched: a `gh` error must block,
          # never silently let a workflow-editing PR through.
          EDITS_WF=false
          if [ -n "$PR_NUMBER" ]; then
            PR_FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files -q '.files[].path') \
              || { echo "::error::gh pr view failed — cannot determine changed files; blocking."; exit 1; }
            if printf '%s\n' "$PR_FILES" | grep -Eq '^[.]github/(workflows|scripts)/|^[.]claude/scripts/'; then
              EDITS_WF=true
            fi
          fi
          TOKEN=$(python3 .github/scripts/gate_check_ran.py \
            "${{ steps.opus_review.outputs.conclusion }}" \
            "${{ steps.opus_review.outputs.skipped_due_to_workflow_validation_mismatch }}" \
            "${{ steps.opus_review.outputs.execution_file }}" \
            "$EDITS_WF")
          echo "gate_check_ran -> $TOKEN (edits_workflows=$EDITS_WF)"
          case "$TOKEN" in
            PASS) echo "Review ran and succeeded." ; exit 0 ;;
            ROUTE_HUMAN) if [ -n "$PR_NUMBER" ]; then gh issue edit "$PR_NUMBER" --add-label needs-human-review || true; fi
                         echo "::error::Needs human review (workflow-edit or incomplete review)." ; exit 1 ;;
            AUTH_FAIL) if [ -n "$PR_NUMBER" ]; then gh issue edit "$PR_NUMBER" --add-label needs-human-review || true; fi
                       echo "::error::🔑 Reviewer AUTH FAILED — 401 Invalid bearer token. The CLAUDE_CODE_OAUTH_TOKEN secret is invalid/expired. Regenerate it: run 'claude setup-token', then set it newline-safe with  printf '%s' <NEW_TOKEN> | gh secret set CLAUDE_CODE_OAUTH_TOKEN -R <owner/repo>" ; exit 1 ;;
            *) echo "::error::Review did not run or errored ($TOKEN)." ; exit 1 ;;
          esac

      # Enforce Opus verdict: parse OPUS_GATE_VERDICT from the execution file.
      # Fail CLOSED — a missing verdict is treated as not-approved.
      # Only runs when the check-ran step succeeded (not always()), so max-turns
      # and auth errors that already triggered ROUTE_HUMAN don't double-fire here.
      - name: Enforce Opus verdict
        if: steps.risk_tier.outputs.tier == 'high' && success()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
        run: |
          set -uo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          VERDICT=$(python3 .github/scripts/gate_verdict.py \
            "${{ steps.opus_review.outputs.execution_file }}")
          echo "opus verdict -> $VERDICT"
          case "$VERDICT" in
            PASS) echo "Opus approved." ; exit 0 ;;
            FAIL) echo "::error::opus-gate: Opus REQUESTED CHANGES — blocking." ; exit 1 ;;
            *) if [ -n "$PR_NUMBER" ]; then gh issue edit "$PR_NUMBER" --add-label needs-human-review || true; fi
               echo "::error::opus-gate: no verdict emitted — fail-closed." ; exit 1 ;;
          esac
