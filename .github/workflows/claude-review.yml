name: Claude Review
# G2 Sonnet — automated PR review + auto-fix + fail-closed enforcement.
#
# Flow:
#   1. PR opened/pushed → this workflow fires
#   2. Claude (Sonnet) reviews the diff, fixes what it can, pushes commits
#   3. Push re-triggers CI (via PAT), but NOT this workflow (actor guard)
#   4. CI passes + this review approved → auto-merge proceeds
#   5. If Claude can't fix something → requests changes → PR stays blocked
#
# Fail-closed (#125 pattern, folded in):
#   The anthropics/claude-code-action SILENTLY SWALLOWS auth/runtime errors —
#   an expired/missing CLAUDE_CODE_OAUTH_TOKEN exits in ~2s with is_error=true
#   and the step still reports success. The "Enforce review actually ran" step
#   parses the execution file and hard-fails on real errors or a missing result,
#   while routing max-turns to the needs-human-review escalation path (not a
#   hard fail, so long PRs still surface for human review rather than blocking).
#
# Loop guard: `github.actor != 'claude[bot]'` prevents infinite cycles.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip develop→main promotion PRs (already staging-tested + canary-gated)
    branches-ignore: [develop]

  # On-demand @claude support (same workflow, interactive mode)
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  review:
    # Auto-review: skip Claude's own commits and Dependabot (loop guard)
    # On-demand: only fire on @claude mentions
    if: |
      (github.event_name == 'pull_request' && github.actor != 'claude[bot]' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # PAT allows Claude's pushes to re-trigger CI workflows
          # (but NOT this workflow, due to the actor guard above)
          token: ${{ secrets.CLAUDE_PAT }}

      - uses: anthropics/claude-code-action@v1
        id: claude_review
        continue-on-error: true
        with:
          github_token: ${{ secrets.CLAUDE_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 60"
          prompt: |
            Review this PR diff for bugs, security issues, and code quality problems.

            Rules:
            - If you find fixable issues (bugs, missing error handling, security gaps),
              fix them directly — edit the files, commit with message format
              "fix(review): <description>", and push.
            - If the PR is clean (no issues, or all issues fixed), approve it.
            - If there are issues you CANNOT fix (architectural problems, unclear intent,
              security decisions needing human judgment), request changes with clear,
              actionable comments explaining what needs to change and why.
            - Focus on: correctness, security, error handling, consistency with existing
              patterns, and data integrity. Do NOT nitpick style — the linter handles that.
            - Do NOT flag issues in CI/workflow YAML, docs, or config-only changes
              unless they have security implications.
            - Keep review comments concise and actionable.

      # Enforce review actually ran — fail-closed, execution-file-first.
      # Logic lives in .github/scripts/gate_check_ran.py (avoids inline Python
      # which breaks YAML parsing when the heredoc contains special characters).
      # Source of truth is the action's execution file (result event / is_error),
      # NOT the `conclusion` output (it renders empty even on a successful run).
      # Cases:
      #   A. PR edits .github/workflows/** OR action self-skip → ROUTE_HUMAN, BLOCK
      #   B. no parseable result event (auth fail / crash) → FAIL_HARD, BLOCK
      #   C. result is_error → max-turns → ROUTE_HUMAN; else FAIL_HARD, BLOCK
      #   D. clean result → PASS (a populated non-success conclusion still fails closed)
      - name: Enforce review actually ran
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PAT }}
        run: |
          set -uo pipefail
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          # Workflow-edit detection: a PR touching .github/workflows/** must never
          # auto-pass — the reviewer cannot push fixes there (the token lacks the
          # `workflows` scope), so route it to a human regardless of review outcome.
          # Fail CLOSED if the file list can't be fetched: a `gh` error must block,
          # never silently let a workflow-editing PR through. Scoped to
          # pull_request events (the merge gate); @claude issue/comment runs skip it.
          EDITS_WF=false
          if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            PR_FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files -q '.files[].path') \
              || { echo "::error::gh pr view failed — cannot determine changed files; blocking."; exit 1; }
            if printf '%s\n' "$PR_FILES" | grep -Eq '^[.]github/(workflows|scripts)/|^[.]claude/scripts/'; then
              EDITS_WF=true
            fi
          fi
          TOKEN=$(python3 .github/scripts/gate_check_ran.py \
            "${{ steps.claude_review.outputs.conclusion }}" \
            "${{ steps.claude_review.outputs.skipped_due_to_workflow_validation_mismatch }}" \
            "${{ steps.claude_review.outputs.execution_file }}" \
            "$EDITS_WF")
          echo "gate_check_ran -> $TOKEN (edits_workflows=$EDITS_WF)"
          case "$TOKEN" in
            PASS) echo "Review ran and succeeded." ; exit 0 ;;
            ROUTE_HUMAN) if [ -n "$PR_NUMBER" ]; then gh issue edit "$PR_NUMBER" --add-label needs-human-review || true; fi
                         echo "::error::Needs human review (workflow-edit or incomplete review)." ; exit 1 ;;
            AUTH_FAIL) if [ -n "$PR_NUMBER" ]; then gh issue edit "$PR_NUMBER" --add-label needs-human-review || true; fi
                       echo "::error::🔑 Reviewer AUTH FAILED — 401 Invalid bearer token. The CLAUDE_CODE_OAUTH_TOKEN secret is invalid/expired. Regenerate it: run 'claude setup-token', then set it newline-safe with  printf '%s' <NEW_TOKEN> | gh secret set CLAUDE_CODE_OAUTH_TOKEN -R <owner/repo>" ; exit 1 ;;
            *) echo "::error::Review did not run or errored ($TOKEN)." ; exit 1 ;;
          esac
