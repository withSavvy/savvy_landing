name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          pip install html5validator
          html5validator --root . --also-check-css \
            --match '*.html' \
            --ignore 'Assets/' \
            --log INFO
