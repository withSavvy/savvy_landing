# Daily credential health check for gate CI secrets.
# Opens/updates ONE pinned issue per invalid credential (label: credential-watchdog);
# closes them on all-clear. UNREACHABLE alone never alerts or fails this workflow.
#
# Manual run: Actions → "Gate Credential Watchdog" → Run workflow.

name: Gate Credential Watchdog

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watchdog:
    name: gate credential watchdog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ISSUE_LABEL: credential-watchdog
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Phase D: monitor the savvy-gate-bot App installation token instead of the
      # retired personal CLAUDE_PAT. Mint it here and probe its health below.
      # continue-on-error so a mint hiccup is a probe UNREACHABLE, not a red job.
      - name: Mint savvy-gate-bot App token
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GATE_APP_ID }}
          private-key: ${{ secrets.GATE_APP_PRIVATE_KEY }}

      - name: Run credential probes
        id: probe
        env:
          # AUTOMATION_ANTHROPIC_API_KEY removed 2026-07-14 — key retired (reviewers
          # run on the Claude subscription OAuth token; nothing consumes it anymore).
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GATE_APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set +e
          node .claude/scripts/gate-credential-watchdog.js --json > watchdog.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "Probe exit code: ${exit_code}"
          cat watchdog.json

      # The alert/close steps below tag issues with $ISSUE_LABEL. Both
      # `gh issue create --label` and `gh issue list --label` hard-fail when that
      # label doesn't exist in the repo ("could not add label: 'credential-watchdog'
      # not found"), which crashed every alerting run BEFORE any issue was filed —
      # so an invalid/missing credential silently never surfaced (exit 1, no alert).
      # Ensure the label exists first (idempotent; --force updates it in place) so
      # the alerting and all-clear steps can always run.
      - name: Ensure credential-watchdog label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "$ISSUE_LABEL" \
            --color D93F0B \
            --description "gate CI credential health alerts (auto-managed by Gate Credential Watchdog)" \
            --force || echo "label ensure failed (non-fatal) — alert step will surface any hard error"

      - name: Open or update invalid-credential issues
        if: steps.probe.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const {
            buildAlertIssueTitle,
            buildIssueBody,
            invalidResults,
            ISSUE_LABEL,
          } = require('./.claude/scripts/gate-credential-watchdog.js');

          const payload = JSON.parse(fs.readFileSync('watchdog.json', 'utf8'));
          const runUrl = process.env.RUN_URL;
          const bad = invalidResults(payload.results);

          for (const row of bad) {
            const title = buildAlertIssueTitle(row.name);
            const body = buildIssueBody(payload.results, { runUrl });

            const listed = execFileSync(
              'gh',
              ['issue', 'list', '--label', ISSUE_LABEL, '--state', 'open', '--json', 'number,title'],
              { encoding: 'utf8' }
            );
            const openIssues = JSON.parse(listed || '[]');
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              execFileSync('gh', ['issue', 'edit', String(existing.number), '--title', title, '--body', body], {
                stdio: 'inherit',
              });
              execFileSync(
                'gh',
                [
                  'issue',
                  'comment',
                  String(existing.number),
                  '--body',
                  `Credential still invalid (${row.verdict}) — updated report from ${runUrl}.`,
                ],
                { stdio: 'inherit' }
              );
              console.log(`Updated issue #${existing.number} for ${row.name}`);
            } else {
              execFileSync(
                'gh',
                ['issue', 'create', '--title', title, '--label', ISSUE_LABEL, '--body', body],
                { stdio: 'inherit' }
              );
              console.log(`Opened issue for ${row.name}`);
            }
          }
          NODE

      - name: Best-effort For-Sara board hook
        if: steps.probe.outputs.exit_code != '0'
        run: |
          BOARD_SCRIPT=".claude/scripts/append-human-task.js"
          if [ -f "$BOARD_SCRIPT" ]; then
            node "$BOARD_SCRIPT" \
              --id "gate-credential-watchdog" \
              --text "Gate CI credential invalid — see open credential-watchdog issue(s)" \
              || echo "append-human-task.js failed (non-fatal)"
          else
            echo "append-human-task.js not present — skipping For-Sara board hook (issue is the pinned channel)"
          fi

      - name: Close credential issues on all-clear
        if: steps.probe.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const { execFileSync } = require('child_process');
          const { ISSUE_LABEL } = require('./.claude/scripts/gate-credential-watchdog.js');

          const runUrl = process.env.RUN_URL;
          const listed = execFileSync(
            'gh',
            ['issue', 'list', '--label', ISSUE_LABEL, '--state', 'open', '--json', 'number,title'],
            { encoding: 'utf8' }
          );
          const openIssues = JSON.parse(listed || '[]');
          if (openIssues.length === 0) {
            console.log('No open credential-watchdog issues — nothing to close.');
            process.exit(0);
          }

          for (const issue of openIssues) {
            execFileSync(
              'gh',
              [
                'issue',
                'comment',
                String(issue.number),
                '--body',
                `✅ All gate credentials valid or only transiently unreachable as of ${runUrl}. Auto-closing.`,
              ],
              { stdio: 'inherit' }
            );
            execFileSync(
              'gh',
              ['issue', 'close', String(issue.number), '--reason', 'completed'],
              { stdio: 'inherit' }
            );
            console.log(`Closed issue #${issue.number}`);
          }
          NODE
