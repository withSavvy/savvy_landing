name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate HTML files
        run: |
          pip install html5validator
          html5validator --root . --also-check-css \
            --match '*.html' \
            --ignore 'Assets/' \
            --ignore-re 'Property "backdrop-filter" doesn'\''t exist' 'Property "inset" doesn'\''t exist' 'too few values for the property "linear-gradient"' 'is not a "color-stop" value' \
            --log INFO
