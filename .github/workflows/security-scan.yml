name: Security Scan

# Deterministic secret-scan floor for repos without a src/ tree (workspace config,
# landing site). Gitleaks scoped to the PR diff (base..head) only — pre-existing
# secrets in historical commits do not block new PRs; any NEW secret hard-blocks.
# Emits the `Gitleaks (secret scan)` required status check, matching the app repos.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for base sha resolution)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan PR commits for secrets (base..head only)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
