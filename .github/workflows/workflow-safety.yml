name: Workflow Safety

# Deterministic "harsh floor" for CI-surface changes — layer 1 of the workflow gate.
# Runs .github/scripts/workflow_safety_scan.py against the PR diff and HARD-BLOCKS on
# any dangerous shape in changed CI files (.github/workflows/**, .github/scripts/**,
# **/action.yml): secret exfiltration, curl|bash, pull_request_target, write-all /
# id-token escalation, secret->$GITHUB_ENV, base64/eval of secrets, and unpinned
# third-party actions.
#
# Pure-Python denylist — fail-closed, ZERO Claude pool, no LLM. Pairs with the
# Sonnet+Opus AI consensus (layer 2). Emits the `workflow-safety` required status
# check. Runs on EVERY PR (no path filter, so the required check never hangs
# "expected"); the scanner's own IN_SCOPE filter no-ops on non-CI diffs.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip develop→main promotion PRs (already staging-tested + canary-gated),
    # matching claude-review/opus-gate.
    branches-ignore: [develop]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: workflow-safety-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  workflow-safety:
    name: workflow-safety
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan changed CI files for dangerous patterns
        id: scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # Full PR diff; the scanner's own IN_SCOPE regex restricts findings to
          # CI-sensitive files, so a non-CI PR passes clean. Pipefail propagates the
          # scanner's exit 1 (block) into a failed step → red `workflow-safety` check.
          git diff "$BASE_SHA...$HEAD_SHA" | python3 .github/scripts/workflow_safety_scan.py

      - name: Escalate to human on block
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ github.event.pull_request.number }}" \
            --repo "$GITHUB_REPOSITORY" --add-label needs-human-review || true
          echo "::error::workflow-safety blocked this PR — dangerous CI pattern; needs human review."
